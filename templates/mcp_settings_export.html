<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MCP Export – Jarvis DisplayPlayer</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f5f7fb; color: #0f172a; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
    .muted { color: #64748b; font-size: 12px; }
    .btn { cursor:pointer; font-weight:700; padding:8px 10px; border-radius:8px; border:1px solid #2563eb; background:#2563eb; color:#fff; }
    pre { background: #0b1120; color: #e2e8f0; padding: 10px; border-radius: 10px; overflow:auto; font-size: 12px; border: 1px solid #1e293b; }
    .mcp-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .tab { text-decoration:none; color:#334155; border:1px solid #cbd5e1; border-radius:999px; padding:6px 10px; font-size:12px; }
    .tab.active { background:#2563eb; border-color:#2563eb; color:#fff; }
  </style>
</head>
<body>
{% set active_page = "mcp" %}
{% include "_nav.html" %}
<div class="wrap">
  <div class="card">
    <h2 style="margin:0 0 6px 0;">MCP Settings · Export</h2>
    {% include "_mcp_settings_tabs.html" %}
  </div>
  <div class="card">
    <div class="muted" style="margin-bottom:8px;">Exports only <code>enabled</code> + non-<code>dangerous</code> actions.</div>
    <button class="btn" id="btnExport">Export MCP Tool Config</button>
    <pre id="exportPre" style="margin-top:10px;">{}</pre>
  </div>
</div>
<script>
async function apiGet(url){ const r=await fetch(url,{headers:{Accept:'application/json'}}); const j=await r.json().catch(()=>({})); if(!r.ok||j.ok===false) throw new Error(j.message||j.error||('HTTP '+r.status)); return j; }
async function run(){ const d=await apiGet('/api/mcp/export'); document.getElementById('exportPre').textContent=JSON.stringify(d.export||{},null,2); }
document.getElementById('btnExport').addEventListener('click', run); run().catch(()=>{});
</script>
</body>
</html>
