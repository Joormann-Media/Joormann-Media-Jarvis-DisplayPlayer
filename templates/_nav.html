<style>
  .jarvis-nav {
    background: #0b1120;
    border-bottom: 1px solid #1e3a5f;
    padding: .7rem 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 10px;
    flex-wrap: wrap;
    font-family: "Space Grotesk", "Manrope", "Segoe UI", sans-serif;
  }
  .jarvis-nav .nav-brand-wrap { display: flex; align-items: center; gap: 8px; }
  .jarvis-nav .nav-brand { font-weight: 700; color: #60a5fa; font-size: .9rem; }
  .jarvis-nav .nav-lab-switcher {
    width: auto;
    min-width: 170px;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid #2c3c63;
    background: #111b30;
    color: #e2e8f0;
    font-size: .78rem;
  }
  .jarvis-nav .nav-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-left: auto; }
  .jarvis-nav .nav-portal { text-align: right; min-width: 220px; }
  .jarvis-nav .nav-portal-name { font-size: .8rem; font-weight: 600; color: #e2e8f0; }
  .jarvis-nav .nav-portal-status { font-size: .72rem; color: #94a3b8; }
  .jarvis-nav .nav-update { text-align: right; min-width: 170px; }
  .jarvis-nav .nav-update-status { font-size: .72rem; color: #94a3b8; }
  .jarvis-nav .nav-sync-btn,
  .jarvis-nav .nav-update-btn { width: auto; white-space: nowrap; background: #2563eb; color: #fff; border: 1px solid #2563eb; padding: 7px 10px; border-radius: 8px; font-weight: 700; cursor: pointer; }
  .jarvis-nav .nav-update-btn { background: #1f8a5b; border-color: #1f8a5b; }
  .jarvis-nav .nav-sync-btn:disabled,
  .jarvis-nav .nav-update-btn:disabled { opacity: .75; cursor: default; }
  .jarvis-nav .nav-links { display: flex; gap: .5rem; flex-wrap: wrap; }
  .jarvis-nav .nav-links a { color: #9fb0d9; font-size: .8rem; padding: .25rem .55rem; border-radius: .3rem; text-decoration: none; transition: background .15s, color .15s; }
  .jarvis-nav .nav-links a:hover { color: #e9efff; background: #172441; }
  .jarvis-nav .nav-links a.active { color: #e9efff; background: #1e3a5f; }
</style>
<nav class="jarvis-nav">
  <div class="nav-brand-wrap">
    <span class="nav-brand">📺 Jarvis DisplayPlayer</span>
    <select id="lab-switcher" class="nav-lab-switcher">
      <option value="">Module wechseln…</option>
    </select>
  </div>
  <div class="nav-actions">
    <div class="nav-portal">
      <div class="nav-portal-name" id="portalNodeName">—</div>
      <div class="nav-portal-status" id="portalSyncStatus">Status wird geladen…</div>
    </div>
    <div class="nav-update">
      <div class="nav-update-status" id="repoUpdateStatus">Update-Check…</div>
    </div>
    <button id="repo-update-apply" class="nav-update-btn">⬆ Update</button>
    <button id="dashboard-sync-btn" class="nav-sync-btn">↻ Sync</button>
    <div class="nav-links">
      <a href="/"{% if active_page == 'dashboard' %} class="active"{% endif %}>Dashboard</a>
      <a href="/media"{% if active_page == 'media' %} class="active"{% endif %}>Media</a>
      <a href="/link"{% if active_page == 'link' %} class="active"{% endif %}>Link</a>
      <a href="/relink"{% if active_page == 'relink' %} class="active"{% endif %}>Re-Link</a>
      <a href="/info"{% if active_page == 'info' %} class="active"{% endif %}>API-Doku</a>
    </div>
  </div>
</nav>
<script>
(function () {
  async function jget(url) {
    const response = await fetch(url, { headers: { Accept: "application/json" }, cache: "no-store" });
    return response.json();
  }

  async function jpost(url, payload) {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", Accept: "application/json" },
      body: JSON.stringify(payload || {}),
    });
    return response.json();
  }

  function setUpdateStatus(payload) {
    const el = document.getElementById("repoUpdateStatus");
    if (!el) return;
    if (payload && payload.ok && payload.update_available) {
      el.textContent = `Update verfügbar · behind ${payload.behind ?? "?"}`;
      el.style.color = "#fbbf24";
    } else if (payload && payload.ok) {
      el.textContent = "Up-to-date";
      el.style.color = "#4ade80";
    } else {
      el.textContent = "Update-Status unbekannt";
      el.style.color = "#fca5a5";
    }
  }

  async function refreshUpdateStatus() {
    try {
      const data = await jget("/api/update/status");
      setUpdateStatus(data);
      return data;
    } catch (_) {
      setUpdateStatus({ ok: false });
      return { ok: false };
    }
  }

  async function autoUpdateFlow() {
    const btn = document.getElementById("repo-update-apply");
    if (!btn) return;
    const old = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Prüfe…";
    try {
      const status = await refreshUpdateStatus();
      if (!(status && status.ok && status.update_available)) {
        btn.textContent = "Aktuell";
        setTimeout(() => { btn.textContent = old; btn.disabled = false; }, 900);
        return;
      }
      btn.textContent = "Update…";
      const result = await jpost("/api/update/apply", {});
      setUpdateStatus(result);
      if (result && result.ok) {
        btn.textContent = "Neustart…";
        setTimeout(() => window.location.reload(), 1800);
        return;
      }
    } catch (_) {
      setUpdateStatus({ ok: false });
    }
    btn.textContent = old;
    btn.disabled = false;
  }

  async function refreshPortalStatus() {
    const nameEl = document.getElementById("portalNodeName");
    const statusEl = document.getElementById("portalSyncStatus");
    if (!nameEl || !statusEl) return;
    try {
      const j = await jget("/api/portal/status");
      const data = (j && j.data) ? j.data : (j || {});
      const registered = Boolean(data.registered);
      nameEl.textContent = data.nodeName || "—";
      if (registered) {
        statusEl.textContent = data.nodeSlug ? `registriert · ${data.nodeSlug}` : "registriert";
        statusEl.style.color = "#4ade80";
      } else {
        statusEl.textContent = "nicht registriert";
        statusEl.style.color = "#fca5a5";
      }
    } catch (_) {
      statusEl.textContent = "Status nicht verfügbar";
      statusEl.style.color = "#fca5a5";
    }
  }

  async function loadPeerModules() {
    const sel = document.getElementById("lab-switcher");
    if (!sel) return;
    const currentPort = String(window.location.port || (window.location.protocol === "https:" ? "443" : "80"));
    try {
      const res = await jget("/api/portal/peers");
      const peers = ((res && res.data) ? res.data.peers : res.peers) || [];
      const rows = Array.isArray(peers) ? peers : [];
      for (const row of rows) {
        const port = String(row.port || "").trim();
        if (!port) continue;
        const opt = document.createElement("option");
        opt.value = port;
        opt.textContent = `${row.name || "Module"} (${port})`;
        if (port === currentPort) opt.selected = true;
        sel.appendChild(opt);
      }
    } catch (_) {}
    sel.addEventListener("change", function () {
      const port = String(sel.value || "").trim();
      if (!port) return;
      const target = `${window.location.protocol}//${window.location.hostname}:${port}/`;
      window.location.href = target;
    });
  }

  async function runDashboardSync() {
    const btn = document.getElementById("dashboard-sync-btn");
    const statusEl = document.getElementById("portalSyncStatus");
    if (!btn) return;
    const oldLabel = btn.textContent;
    btn.disabled = true;
    btn.textContent = "Sync läuft…";
    if (statusEl) {
      statusEl.textContent = "Sync läuft…";
      statusEl.style.color = "#94a3b8";
    }
    try {
      await jpost("/api/portal/sync", {});
      await refreshPortalStatus();
    } catch (_) {
      if (statusEl) {
        statusEl.textContent = "Sync fehlgeschlagen";
        statusEl.style.color = "#fca5a5";
      }
    } finally {
      btn.disabled = false;
      btn.textContent = oldLabel;
    }
  }

  document.addEventListener("DOMContentLoaded", function () {
    const syncBtn = document.getElementById("dashboard-sync-btn");
    const updateBtn = document.getElementById("repo-update-apply");
    if (syncBtn) syncBtn.addEventListener("click", runDashboardSync);
    if (updateBtn) updateBtn.addEventListener("click", autoUpdateFlow);
    refreshPortalStatus();
    refreshUpdateStatus();
    loadPeerModules();
  });
})();
</script>
